version: "3"

services:

  vulndesk-mongo:
    image: mongo:6
    command: mongod --port ${MONGO_PORT:-27017}
    restart: always
    volumes:
      - vulndesk-mongo-data:/data/db
    env_file:
      - ${ENV_VAR_PATH:-example.env}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:${MONGO_PORT:-27017}/vulndesk --quiet
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - ${MONGO_PORT:-27017}:${MONGO_PORT:-27017}

  vulndesk:
    build: .
    image: vulndesk/vulndesk:latest

    container_name: vulndesk

    ports:
      - ${VULNDESK_PORT:-3555}:${VULNDESK_PORT:-3555}

    env_file:
      - ${ENV_VAR_PATH:-example.env}

    depends_on:
      vulndesk-mongo:
        condition: service_healthy

volumes:
  vulndesk-mongo-data:
